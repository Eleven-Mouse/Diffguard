name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi

          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid tag: $TAG (expected: vMAJOR.MINOR.PATCH or pre-release suffix)"
            exit 1
          fi

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

  verify:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag exists
        shell: bash
        run: |
          TAG="${{ needs.meta.outputs.release_tag }}"
          git fetch --tags --force
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG does not exist in repository."
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Java tests
        working-directory: services/gateway
        run: mvn -B verify

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/agent/pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Python tests
        working-directory: services/agent
        run: |
          uv sync --dev
          uv run pytest tests/ -v --tb=short

  build:
    needs: [meta, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout tag commit
        shell: bash
        run: |
          git fetch --tags --force
          git checkout "${{ needs.meta.outputs.release_tag }}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build shaded JAR
        working-directory: services/gateway
        run: mvn -B -DskipTests package

      - name: Package release assets
        shell: bash
        run: |
          TAG="${{ needs.meta.outputs.release_tag }}"
          mkdir -p dist
          JAR_PATH=$(ls services/gateway/target/diffguard-*.jar | grep -v "original-" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::Cannot find built JAR in services/gateway/target/"
            exit 1
          fi

          cp "$JAR_PATH" "dist/diffguard-${TAG}.jar"
          sha256sum "dist/diffguard-${TAG}.jar" > "dist/diffguard-${TAG}.jar.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: dist/
          if-no-files-found: error

  publish:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-assets
          path: dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.meta.outputs.release_tag }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, uploading assets with --clobber."
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --title "$TAG" --generate-notes
          fi
