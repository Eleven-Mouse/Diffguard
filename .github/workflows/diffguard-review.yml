name: DiffGuard PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: diffguard-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secret
        id: precheck
        shell: bash
        run: |
          if [ -z "${{ secrets.DIFFGUARD_API_KEY }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DIFFGUARD_API_KEY is not set. Skipping DiffGuard review."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run DiffGuard (local action)
        if: steps.precheck.outputs.enabled == 'true'
        uses: ./
        with:
          api-key: ${{ secrets.DIFFGUARD_API_KEY }}
          provider: openai
          model: mimo-v2.5-pro
          api-base-url: ${{ secrets.DIFFGUARD_API_BASE_URL }}
          language: zh
          comment-pr: true
          enable-fp-filter: true
          timeout-minutes: 10
