name: DiffGuard Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: diffguard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: DiffGuard
        uses: Eleven-Mouse/Diffguard@v1.0.0
        with:
          api-key: ${{ secrets.DIFFGUARD_API_KEY }}
          provider: ${{ secrets.DIFFGUARD_PROVIDER }}
          model: ${{ secrets.DIFFGUARD_MODEL }}
          api-base-url: ${{ secrets.DIFFGUARD_API_BASE_URL }} # 可选；不用代理可删掉
          language: zh
          comment-pr: true
          exclude-directories: "docs,examples,dist,build,node_modules"
          enable-fp-filter: true
          timeout-minutes: 12
          use-java-tool-server: false
