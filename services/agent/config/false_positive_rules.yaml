# DiffGuard False Positive Rules Configuration
# 基于 Claude 官方安全审查项目的规则库
# 更新时间: 2026-05-10

# ============================================================
# Hard Exclusion Rules (正则匹配)
# ============================================================
# 这些规则用于快速过滤明显的误报，使用预编译正则匹配

exclusion_rules:
  # -------- DOS / Resource Exhaustion --------
  - id: "dos-vulnerability"
    description: "Generic DOS vulnerability"
    patterns:
      - "denial of service"
      - "dos attack"
      - "resource exhaustion"
      - "(exhaust|overwhelm|overload).*(resource|memory|cpu)"
      - "(infinite|unbounded).*(loop|recursion)"

  - id: "rate-limiting"
    description: "Rate limiting recommendations"
    patterns:
      - "(missing|lack of|no).*rate limit"
      - "(implement|add).*rate limit"
      - "unlimited.*(requests|calls|api)"

  - id: "resource-leak"
    description: "Resource management issues"
    patterns:
      - "(resource|memory|file).*leak.*potential"
      - "(unclosed|not closed).*(resource|file|connection)"
      - "(close|cleanup|release).*(resource|file|connection)"

  # -------- Memory Safety (C/C++ only) --------
  - id: "memory-safety-non-cpp"
    description: "Memory safety findings in non-C/C++ code"
    patterns:
      - "buffer overflow"
      - "use.*after.*free"
      - "double.*free"
      - "stack overflow"
      - "heap overflow"
      - "out.*of.*bounds.*(read|write|access)"
      - "integer overflow"
    applies_to_extensions:
      - exclude: [".c", ".cc", ".cpp", ".h", ".hpp"]

  # -------- Web Vulnerabilities --------
  - id: "open-redirect"
    description: "Open redirect vulnerability (low impact)"
    patterns:
      - "open redirect"
      - "unvalidated redirect"

  - id: "ssrf-client-side"
    description: "SSRF in client-side JavaScript/TypeScript"
    applies_to_extensions:
      - exclude: [".js", ".ts", ".tsx", ".jsx"]
    note: "Client-side code cannot make server-side requests that bypass firewalls"

  - id: "path-traversal-client"
    description: "Path traversal using ../ in HTTP requests"
    patterns:
      - "path traversal.*(http|request)"
    note: "Path traversal via ../ is generally not a problem for HTTP requests"

  # -------- Generic Patterns --------
  - id: "regex-dos"
    description: "Regex injection / ReDoS"
    patterns:
      - "(regex|regular expression).*injection"
      - "(regex|regular expression).*denial of service"

  - id: "generic-performance"
    description: "Generic performance suggestions without specifics"
    patterns:
      - "consider.*(adding|using|implementing).*caching"
      - "add.*caching.*layer"
      - "consider.*connection.*pool"
      - "use.*connection.*pool"

  - id: "generic-suggestion"
    description: "Overly generic suggestions"
    patterns:
      - "follow.*best.*practices"
      - "improve.*code.*quality"
      - "consider.*refactoring"
      - "follow.*(coding|code).*standards"
      - "this.*(code|method|function).*could.*be.*improved"
      - "add.*more.*(comments|documentation)"

  # -------- File Type Exclusions --------
  - id: "documentation-file"
    description: "Findings in documentation files"
    applies_to_files:
      - extensions: [".md", ".txt", ".rst", ".adoc", ".tex", ".org"]
      - pattern: "README|LICENSE|CHANGELOG"

  - id: "test-file"
    description: "Findings in test files"
    applies_to_files:
      - patterns:
          - "Test.java"
          - "Tests.java"
          - "Spec.java"
          - "IT.java"
          - "_test.py"
          - "test_"
          - "Test.kt"
          - "Tests.kt"
          - ".test.ts"
          - ".test.tsx"
          - ".spec.ts"
          - ".spec.tsx"
          - "Test.js"
          - "tests.js"
          - "__tests__"
          - "test_utils.py"
          - "test_service.py"

  - id: "generated-file"
    description: "Findings in generated files"
    applies_to_files:
      - patterns:
          - "@generated"
          - "Code generated by"
          - "protoc-gen"

# ============================================================
# Precedent Rules (已知的误报模式)
# ============================================================
# 这些规则基于语言/框架特定的知识，识别已知的误报模式

precedents:
  # -------- Java/Spring --------
  - pattern: "JPA @Query with :named parameters"
    verdict: "not_sql_injection"
    reason: "JPA @Query with :param uses parameterized queries internally"
    applies_to:
      - file_pattern: "*.java"
        content: "@Query.*:"

  - pattern: "PreparedStatement with parameter binding"
    verdict: "not_sql_injection"
    reason: "PreparedStatement uses parameterized queries"
    applies_to:
      - content: "PreparedStatement"

  - pattern: "MyBatis #{param} syntax"
    verdict: "not_sql_injection"
    reason: "MyBatis #{} uses parameterized binding; only ${} is unsafe"
    applies_to:
      - file_pattern: "*.xml"
        content: "#{"

  - pattern: "Spring @Value with ${...} placeholder"
    verdict: "not_hardcoded_secret"
    reason: "Spring property placeholder references external config"
    applies_to:
      - file_pattern: "*.java"
        content: "@Value.*\\$\\{"

  - pattern: "Spring Security @PreAuthorize / @Secured annotation"
    verdict: "not_missing_auth"
    reason: "Method-level security annotations provide authorization"
    applies_to:
      - file_pattern: "*.java"
        content: "@PreAuthorize|@Secured|@RolesAllowed"

  - pattern: "try-with-resources in Java"
    verdict: "not_resource_leak"
    reason: "try-with-resources guarantees resource cleanup"
    applies_to:
      - file_pattern: "*.java"
        content: "try.*AutoCloseable"

  - pattern: "Spring @Transactional on service method"
    verdict: "not_missing_transaction"
    reason: "Annotation-based transaction management is active"
    applies_to:
      - file_pattern: "*.java"
        content: "@Transactional"

  - pattern: "Log statement with structured logging"
    verdict: "not_log_injection"
    reason: "Structured logging frameworks handle sanitization"
    applies_to:
      - file_pattern: "*.java"
        content: "logger\\.(info|debug|warn|error)"

  # -------- Python --------
  - pattern: "UUID usage as identifier"
    verdict: "not_predictable_id"
    reason: "UUIDs are unguessable"
    applies_to:
      - content: "uuid|UUID"

  - pattern: "Environment variable or config property reference"
    verdict: "not_hardcoded"
    reason: "Environment variables and config properties are trusted input"
    applies_to:
      - content: "os\\.getenv|environ\\[|.getenv"

  # -------- JavaScript/TypeScript --------
  - pattern: "React is generally secure against XSS"
    verdict: "not_xss"
    reason: "React escapes content by default; only dangerous with dangerouslySetInnerHTML"
    applies_to:
      - file_pattern: "*.tsx"
        exclude_content: "dangerouslySetInnerHTML"

  - pattern: "Client-side SSRF is not exploitable"
    verdict: "not_ssrf"
    reason: "Client-side JS cannot bypass firewalls or access internal resources"
    applies_to:
      - file_pattern: "*.ts"
        exclude_content: "server"

  - pattern: "Lack of permission checking in client-side TS"
    verdict: "not_missing_auth"
    reason: "Client-side code is not trusted; server is responsible for validation"
    applies_to:
      - file_pattern: "*.ts"
        exclude_content: "server|backend"

  # -------- GitHub Actions --------
  - pattern: "GitHub Action workflow vulnerabilities"
    verdict: "not_action_vuln"
    reason: "Most GitHub Action workflow vulnerabilities are not exploitable in practice"
    applies_to:
      - file_pattern: "*.yml"
        path_contains: ".github/workflows"

  # -------- Shell Scripts --------
  - pattern: "Command injection in shell scripts"
    verdict: "not_command_injection"
    reason: "Shell scripts generally do not run with untrusted user input"
    applies_to:
      - file_pattern: "*.sh"
        exclude_content: "user_input|user-controlled|untrusted"

  # -------- Log Spoofing --------
  - pattern: "Log spoofing concerns"
    verdict: "not_log_injection"
    reason: "Outputting un-sanitized user input to logs is not a vulnerability"
    applies_to:
      - content: "log|logger|logging"

  # -------- IPython Notebooks --------
  - pattern: "IPython notebook vulnerabilities"
    verdict: "not_ipynb_vuln"
    reason: "Most notebook vulnerabilities are not exploitable in practice"
    applies_to:
      - file_pattern: "*.ipynb"

# ============================================================
# Language-Specific Rules
# ============================================================
# 按语言应用不同的规则

language_rules:
  rust:
    - id: "rust-memory-safety"
      description: "Memory safety issues are impossible in Rust"
      patterns:
        - "buffer overflow"
        - "use-after-free"
        - "memory corruption"
      applies_to_extensions: [".rs"]

  python:
    - id: "pickle-not-python"
      description: "Pickle deserialization only applies to Python"
      patterns:
        - "pickle.*injection"
        - "pickle.*deserialization"
      applies_to_extensions: [".py"]

  go:
    - id: "go-concurrent-safety"
      description: "Go race conditions require specific conditions"
      patterns:
        - "race condition"
      applies_to_extensions: [".go"]

# ============================================================
# Severity-Specific Rules
# ============================================================
# 根据严重程度应用不同的过滤策略

severity_rules:
  medium_findings:
    threshold: "only_report_obvious"
    description: "Only report MEDIUM findings if they are obvious and concrete"
    applies_to_severity: ["MEDIUM"]

  low_findings:
    threshold: "never_report"
    description: "LOW findings should not be reported"
    applies_to_severity: ["LOW", "INFO"]

# ============================================================
# Confidence Thresholds
# ============================================================
# 基于置信度过滤

confidence_thresholds:
  minimum_confidence: 0.7
  description: "Only report findings with confidence >= 0.7"
  auto_exclude_below: 0.5

# ============================================================
# File Path Exclusions
# ============================================================
# 排除特定路径的文件

path_exclusions:
  - pattern: "node_modules/"
  - pattern: "dist/"
  - pattern: "build/"
  - pattern: "target/"
  - pattern: ".git/"
  - pattern: "vendor/"
  - pattern: "__pycache__/"
  - pattern: "*.min.js"
  - pattern: "*.bundle.js"