# DiffGuard Agent Composition Configuration
# Define which agents participate in multi-agent review mode.
#
# To add a custom agent:
#   1. Create a ReviewAgent subclass with @AgentRegistry.register("name")
#   2. Add an entry below with the agent name and parameters
#   3. The StrategyPlanner will automatically include it when appropriate
#
# Agents with weight 0 are disabled. The strategy planner may override
# these weights based on the diff profile.

agents:
  security:
    weight: 1.2
    description: "Security vulnerability detection"
    focus:
      - SQL injection
      - XSS
      - Authentication bypass
      - Secret exposure
    rules:
      - Check all user inputs for validation
      - Verify authentication on all endpoints

  performance:
    weight: 1.0
    description: "Performance bottleneck detection"
    focus:
      - N+1 queries
      - Memory leaks
      - Inefficient algorithms
    rules:
      - Check loop complexity
      - Verify resource cleanup

  architecture:
    weight: 1.0
    description: "Design pattern and structural issues"
    focus:
      - Layer violations
      - Tight coupling
      - SOLID violations
    rules:
      - Verify dependency direction
      - Check abstraction levels

# Pipeline configuration for pipeline mode
pipeline:
  config_file: "pipeline/pipeline-config.yaml"
