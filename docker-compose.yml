# DiffGuard — two-service deployment (Java webhook + Python review).
#
# GitHub Action mode: no Docker needed. Just add the Action to your workflow.
# This compose file runs DiffGuard as a self-hosted webhook service.
#
# Architecture:
#   Java Gateway (8080) — webhook receiver + AST tool server (9090)
#   Python Agent (8000) — review engine (LLM + GitHub API)

services:
  diffguard-gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - DIFFGUARD_API_KEY=${DIFFGUARD_API_KEY:-}
      - DIFFGUARD_WEBHOOK_SECRET=${DIFFGUARD_WEBHOOK_SECRET:-}
      - DIFFGUARD_GITHUB_TOKEN=${DIFFGUARD_GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  diffguard-agent:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DIFFGUARD_API_KEY=${DIFFGUARD_API_KEY:-}
      - JAVA_TOOL_SERVER_URL=http://diffguard-gateway:9090
      - DIFFGUARD_TOOL_SECRET=${DIFFGUARD_TOOL_SECRET:-}
    depends_on:
      diffguard-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
