services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: diffguard
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-diffguard123}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - diffguard-net

  diffguard-gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:9090:9090" # tool server (localhost only)
      - "9091:9091"           # metrics
    environment:
      - DIFFGUARD_AGENT_URL=http://diffguard-agent:8000
      - DIFFGUARD_API_KEY=${DIFFGUARD_API_KEY:-}
      - DIFFGUARD_TOOL_SECRET=${DIFFGUARD_TOOL_SECRET:-}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=diffguard
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-diffguard123}
    volumes:
      - ${PROJECT_DIR:-.}:/project:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      diffguard-agent:
        condition: service_healthy
    networks:
      - diffguard-net

  diffguard-agent:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - JAVA_TOOL_SERVER_URL=http://diffguard-gateway:9090
      - DIFFGUARD_TOOL_SECRET=${DIFFGUARD_TOOL_SECRET:-}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=diffguard
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-diffguard123}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - diffguard-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  rabbitmq_data:

networks:
  diffguard-net:
    driver: bridge
