name: 'DiffGuard AI Code Review'
description: 'AI-powered code review using multi-agent pipeline — security, logic, performance, and code quality.'
author: 'DiffGuard'

inputs:
  api-key:
    description: 'LLM API key (Anthropic or OpenAI)'
    required: true
    default: ''
  provider:
    description: 'LLM provider: "claude" or "openai"'
    required: false
    default: 'claude'
  model:
    description: 'Model name (e.g. claude-sonnet-4-20250514, gpt-4o)'
    required: false
    default: 'claude-sonnet-4-20250514'
  api-base-url:
    description: 'Optional custom LLM API base URL (OpenAI-compatible or Anthropic-compatible endpoint)'
    required: false
    default: ''
  language:
    description: 'Review output language: "zh" or "en"'
    required: false
    default: 'zh'
  comment-pr:
    description: 'Whether to comment on PRs with findings'
    required: false
    default: 'true'
  exclude-directories:
    description: 'Comma-separated list of directories to exclude'
    required: false
    default: ''
  enable-fp-filter:
    description: 'Enable false-positive filtering (regex rules)'
    required: false
    default: 'true'
  timeout-minutes:
    description: 'Timeout for the review in minutes'
    required: false
    default: '10'
  use-java-tool-server:
    description: 'Whether to start Java Tool Server and enable tool calls in review pipeline'
    required: false
    default: 'false'
  tool-server-url:
    description: 'Java Tool Server URL passed to agent when use-java-tool-server is true'
    required: false
    default: 'http://127.0.0.1:9090'

outputs:
  findings-count:
    description: 'Number of review findings'
    value: ${{ steps.diffguard-review.outputs.findings_count }}
  results-file:
    description: 'Path to the results JSON file'
    value: ${{ steps.diffguard-review.outputs.results_file }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      shell: bash
      run: |
        pip install -r ${{ github.action_path }}/services/agent/requirements-github-action.txt

    - name: Set up Java
      if: inputs.use-java-tool-server == 'true'
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'
        cache: maven

    - name: Build gateway (for Tool Server)
      if: inputs.use-java-tool-server == 'true'
      shell: bash
      run: |
        cd ${{ github.action_path }}/services/gateway
        mvn -B -DskipTests package

    - name: Start Java Tool Server
      if: inputs.use-java-tool-server == 'true'
      shell: bash
      run: |
        cd ${{ github.action_path }}
        JAR_PATH=$(ls services/gateway/target/diffguard-*.jar | head -n 1)
        if [ -z "$JAR_PATH" ]; then
          echo "::error::Cannot find gateway jar in services/gateway/target/"
          exit 1
        fi
        nohup java -jar "$JAR_PATH" tool-server --port 9090 > tool-server.log 2>&1 &
        for i in {1..30}; do
          if curl -s "http://127.0.0.1:9090/api/v1/tools/session" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"project_dir":".","diff_entries":[]}' | grep -q '"success":true'; then
            echo "Java Tool Server is up"
            break
          fi
          sleep 1
        done
        if ! curl -s "http://127.0.0.1:9090/api/v1/tools/session" \
          -X POST \
          -H "Content-Type: application/json" \
          -d '{"project_dir":".","diff_entries":[]}' | grep -q '"success":true'; then
          echo "::error::Java Tool Server did not become ready in time"
          echo "::group::Tool Server Log"
          cat tool-server.log || true
          echo "::endgroup::"
          exit 1
        fi

    - name: Run DiffGuard Review
      id: diffguard-review
      if: github.event_name == 'pull_request' || env.PR_NUMBER != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ env.PR_NUMBER || github.event.pull_request.number }}
        DIFFGUARD_API_KEY: ${{ inputs.api-key }}
        DIFFGUARD_API_BASE_URL: ${{ inputs.api-base-url }}
        DIFFGUARD_PROVIDER: ${{ inputs.provider }}
        DIFFGUARD_MODEL: ${{ inputs.model }}
        DIFFGUARD_LANGUAGE: ${{ inputs.language }}
        DIFFGUARD_COMMENT_PR: ${{ inputs.comment-pr }}
        DIFFGUARD_EXCLUDE_DIRS: ${{ inputs.exclude-directories }}
        DIFFGUARD_ENABLE_FP_FILTER: ${{ inputs.enable-fp-filter }}
        DIFFGUARD_TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
        DIFFGUARD_USE_JAVA_TOOL_SERVER: ${{ inputs.use-java-tool-server }}
        DIFFGUARD_TOOL_SERVER_URL: ${{ inputs.tool-server-url }}
        REPO_PATH: ${{ github.workspace }}
        DIFFGUARD_ARTIFACT_DIR: ${{ runner.temp }}/diffguard-review-results
      run: |
        echo "Running DiffGuard AI Code Review..."
        mkdir -p "$DIFFGUARD_ARTIFACT_DIR"
        cd ${{ github.action_path }}/services/agent
        export PYTHONPATH="${{ github.action_path }}/services/agent/src:${{ github.action_path }}/services/agent"
        echo "results_file=review-output.json" >> $GITHUB_OUTPUT
        python -m diffguard_agent.github_action_runner > review-output.json 2>review-error.log || DIFFGUARD_EXIT_CODE=$?

        cp -f review-output.json "$DIFFGUARD_ARTIFACT_DIR/review-output.json" 2>/dev/null || true
        cp -f review-error.log "$DIFFGUARD_ARTIFACT_DIR/review-error.log" 2>/dev/null || true
        cp -f "${{ github.action_path }}/tool-server.log" "$DIFFGUARD_ARTIFACT_DIR/tool-server.log" 2>/dev/null || true

        if [ -f review-output.json ]; then
          FINDINGS=$(python -c "import json,sys; d=json.load(open('review-output.json')); print(len(d.get('issues',[])))" 2>/dev/null || echo "0")
          echo "findings_count=$FINDINGS" >> $GITHUB_OUTPUT
          echo "DiffGuard found $FINDINGS review findings"
        else
          echo "findings_count=0" >> $GITHUB_OUTPUT
        fi

        if [ -n "$DIFFGUARD_EXIT_CODE" ]; then
          echo "::warning::DiffGuard exited with code $DIFFGUARD_EXIT_CODE"
          if [ -f review-error.log ]; then
            echo "::group::DiffGuard Error Log"
            cat review-error.log
            echo "::endgroup::"
          fi
          exit "$DIFFGUARD_EXIT_CODE"
        fi

    - name: Upload review artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: diffguard-review-results
        path: |
          ${{ runner.temp }}/diffguard-review-results/review-output.json
          ${{ runner.temp }}/diffguard-review-results/review-error.log
          ${{ runner.temp }}/diffguard-review-results/tool-server.log
        retention-days: 7
        if-no-files-found: ignore

branding:
  icon: 'shield'
  color: 'blue'
