# DiffGuard 配置文件

llm:
  provider: claude
  model: mimo-v2-pro
  max_tokens: 16384
  temperature: 0.3
  timeout_seconds: 240
  # API key 仅通过环境变量设置，禁止明文写入配置文件
  api_key_env: DIFFGUARD_API_KEY
  # 自定义 API 地址（也可通过环境变量 DIFFGUARD_API_BASE_URL 设置）
  # base_url: https://api.your-proxy.com/v1
  base_url_env: DIFFGUARD_API_BASE_URL


rules:
  enabled:
    - security
    - bug-risk
    - code-style
    - performance
  severity_threshold: info

ignore:
  files:
    - "**/*.generated.java"
    - "**/target/**"
    - "**/node_modules/**"
    - "**/*.min.js"
    - "**/*.min.css"
    - "**/package-lock.json"
    - "**/pom.xml"
  patterns:
    - ".*import statement.*"

review:
  max_diff_files: 20
  max_tokens_per_file: 4000
  language: zh

# Code RAG Embedding 配置
# embedding:
#   provider: tfidf            # tfidf 或 openai
#   model: text-embedding-3-small  # OpenAI embedding 模型
#   dimensions: 1536           # 向量维度

# Agent 服务配置（微服务部署时使用）
# agent_service:
#   url: http://localhost:8000
#   timeout_seconds: 300
#   tool_server_port: 9090

# 消息队列配置（微服务部署时使用）
# message_queue:
#   enabled: false
#   host: localhost
#   port: 5672
#   user: guest
#   password_env: RABBITMQ_PASSWORD

# 数据库配置（微服务部署时使用）
# database:
#   enabled: false
#   host: localhost
#   port: 3306
#   name: diffguard
#   user: diffguard
#   password_env: MYSQL_PASSWORD

# Redis 配置（微服务部署时使用）
# redis:
#   enabled: false
#   host: localhost
#   port: 6379

# Webhook 服务器配置（仅 server 模式需要）
# webhook:
#   port: 8080
#   secret_env: DIFFGUARD_WEBHOOK_SECRET
#   github_token_env: DIFFGUARD_GITHUB_TOKEN
#   repos:
#     - full_name: "owner/repo"
#       local_path: "/path/to/local/repo"
