# DiffGuard 配置文件
# 将此文件放置在项目根目录下，命名为 .review-config.yml

llm:
  provider: openai
  model: gpt-5
  max_tokens: 16384
  temperature: 0.3
  timeout_seconds: 60
  # API key 仅通过环境变量设置，禁止明文写入配置文件
  api_key_env: DIFFGUARD_API_KEY
  # 自定义 API 地址
  # base_url: https://api.your-proxy.com/v1

rules:
  enabled:
    - security
    - bug-risk
    - code-style
    - performance
  severity_threshold: info

ignore:
  files:
    - "**/*.generated.java"
    - "**/target/**"
    - "**/node_modules/**"
    - "**/*.min.js"
    - "**/*.min.css"
    - "**/package-lock.json"
    - "**/pom.xml"
  patterns:
    - ".*import statement.*"

review:
  max_diff_files: 20
  max_tokens_per_file: 4000
  language: zh

# Webhook 服务器配置（仅 server 模式需要）
# webhook:
#   port: 8080
#   secret_env: DIFFGUARD_WEBHOOK_SECRET
#   github_token_env: DIFFGUARD_GITHUB_TOKEN
#   repos:
#     - full_name: "owner/repo"
#       local_path: "/path/to/local/repo"
