# DiffGuard 配置文件
# 将此文件放置在项目根目录下，命名为 .review-config.yml

llm:
  provider: openai
  model: claude-sonnet-4-6
  max_tokens: 16384
  temperature: 0.3
  timeout_seconds: 240
  # API key 仅通过环境变量设置，禁止明文写入配置文件
  api_key_env: DIFFGUARD_API_KEY
  # 自定义 API 地址
  # base_url: https://api.your-proxy.com/v1


rules:
  enabled:
    - security
    - bug-risk
    - code-style
    - performance
  severity_threshold: info

ignore:
  files:
    - "**/*.generated.java"
    - "**/target/**"
    - "**/node_modules/**"
    - "**/*.min.js"
    - "**/*.min.css"
    - "**/package-lock.json"
    - "**/pom.xml"
  patterns:
    - ".*import statement.*"

review:
  max_diff_files: 20
  max_tokens_per_file: 4000
  language: zh

# Code RAG Embedding 配置
# embedding:
#   provider: tfidf            # tfidf 或 openai
#   model: text-embedding-3-small  # OpenAI embedding 模型
#   dimensions: 1536           # 向量维度

# Webhook 服务器配置（仅 server 模式需要）
