# DiffGuard 配置文件
# 将此文件放置在项目根目录下，命名为 .review-config.yml

llm:
  provider: openai
  model: claude-sonnet-4-6
  max_tokens: 16384
  temperature: 0.3
  timeout_seconds: 60
  # API key 通过环境变量设置（推荐）或在此处填写
  api_key_env: DIFFGUARD_API_KEY
  # 自定义 API 地址（留空使用官方地址）
  # base_url: https://api.your-proxy.com/v1

rules:
  enabled:
    - security
    - bug-risk
    - code-style
    - performance
  severity_threshold: info

ignore:
  files:
    - "**/*.generated.java"
    - "**/target/**"
    - "**/node_modules/**"
    - "**/*.min.js"
    - "**/*.min.css"
    - "**/package-lock.json"
    - "**/pom.xml"
  patterns:
    - ".*import statement.*"

review:
  max_diff_files: 20
  max_tokens_per_file: 4000
  language: zh
