# DiffGuard 配置文件
# 将此文件放置在项目根目录下，命名为 .review-config.yml


rules:
  enabled:
    - security
    - bug-risk
    - code-style
    - performance
  severity_threshold: info

ignore:
  files:
    - "**/*.generated.java"
    - "**/target/**"
    - "**/node_modules/**"
    - "**/*.min.js"
    - "**/*.min.css"
    - "**/package-lock.json"
    - "**/pom.xml"
  patterns:
    - ".*import statement.*"

review:
  max_diff_files: 20
  max_tokens_per_file: 4000
  language: zh

